custom-keybindings=['/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/terminal/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/files/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/browser/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/code/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/settings/', '/org/gnome/settings-daemon/plugins/media-keys/custom-keybindings/task-manager/']

[custom-keybindings/browser]
